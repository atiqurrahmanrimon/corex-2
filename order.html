<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoreX - Secure Checkout</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #000;
            color: #fff;
            padding-top: 80px;
        }
        .checkout-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
            display: grid;
            grid-template-columns: 1.5fr 1fr;
            gap: 50px;
        }
        .checkout-form h2 {
            font-size: 2rem;
            margin-bottom: 30px;
            font-weight: 600;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #888;
            font-size: 0.9rem;
        }
        .form-group input {
            width: 100%;
            padding: 15px;
            background-color: #111;
            border: 1px solid #333;
            border-radius: 10px;
            color: #fff;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            transition: border-color 0.3s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #2997ff;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .btn-submit {
            width: 100%;
            padding: 18px;
            background-color: #2997ff;
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s;
            margin-top: 20px;
        }
        .btn-submit:hover {
            background-color: #147ce6;
        }
        .order-summary {
            background-color: #111;
            padding: 40px;
            border-radius: 20px;
            height: fit-content;
            position: sticky;
            top: 100px;
        }
        .order-summary h3 {
            font-size: 1.5rem;
            margin-bottom: 30px;
            border-bottom: 1px solid #333;
            padding-bottom: 15px;
        }
        .summary-item {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
        }
        .summary-item img {
            width: 100px;
            height: 100px;
            object-fit: contain;
            background-color: #000;
            border-radius: 12px;
            padding: 10px;
        }
        .summary-details h4 {
            font-size: 1.2rem;
            margin-bottom: 5px;
        }
        .summary-details p {
            color: #888;
            font-size: 1rem;
        }
        .summary-totals {
            border-top: 1px solid #333;
            padding-top: 20px;
            margin-top: 20px;
        }
        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            color: #888;
        }
        .summary-row.total {
            color: #fff;
            font-size: 1.5rem;
            font-weight: 600;
            margin-top: 20px;
            border-top: 1px solid #333;
            padding-top: 20px;
        }
        
        /* Modals */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: #111;
            padding: 50px;
            border-radius: 20px;
            text-align: center;
            max-width: 400px;
            border: 1px solid #333;
        }
        .modal-content h2 { font-size: 2rem; margin-bottom: 20px; color: #2997ff; }
        .modal-content p { color: #ccc; margin-bottom: 30px; }
        
        @media (max-width: 768px) {
            .checkout-container { grid-template-columns: 1fr; }
            .order-summary { position: static; margin-bottom: 40px; order: -1; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-content">
            <a href="index.html" class="logo"><img src="assets/images/logo.png" alt="CoreX" style="height: 35px; width: auto; display: block;"></a>
            <ul class="nav-links">
                <li><a href="index.html">Back to Store</a></li>
            </ul>
        </div>
    </nav>

    <div class="checkout-container">
        <!-- Checkout Form -->
        <div class="checkout-form">
            <h2>Shipping Details</h2>
            <form id="checkoutForm">
                <div class="form-row">
                    <div class="form-group">
                        <label>First Name</label>
                        <input type="text" required placeholder="John">
                    </div>
                    <div class="form-group">
                        <label>Last Name</label>
                        <input type="text" required placeholder="Doe">
                    </div>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" required placeholder="john@example.com">
                </div>
                <div class="form-group">
                    <label>Shipping Address</label>
                    <input type="text" required placeholder="123 Apple Park Way">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>City</label>
                        <input type="text" required placeholder="Dhaka">
                    </div>
                    <div class="form-group">
                        <label>Delivery Region</label>
                        <select id="deliveryRegion" style="width: 100%; padding: 15px; background-color: #111; color: #fff; border: 1px solid #333; border-radius: 12px; font-size: 1rem;">
                            <option value="inside">Inside Dhaka (80 ৳)</option>
                            <option value="outside">Outside Dhaka (130 ৳)</option>
                        </select>
                    </div>
                </div>
                
                <h2 style="margin-top: 40px;">Payment</h2>
                <div class="form-group">
                    <label>Card Number</label>
                    <input type="text" required placeholder="0000 0000 0000 0000">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Expiry Date</label>
                        <input type="text" required placeholder="MM/YY">
                    </div>
                    <div class="form-group">
                        <label>CVV</label>
                        <input type="password" required placeholder="123">
                    </div>
                </div>
                
                <button type="submit" class="btn-submit">Complete Order</button>
            </form>
        </div>

        <!-- Order Summary -->
        <div class="order-summary">
            <h3>Order Summary</h3>
            <div class="summary-item">
                <img src="" id="summaryImg" alt="Product">
                <div class="summary-details">
                    <h4 id="summaryTitle">Loading...</h4>
                    <p>Qty: 1</p>
                </div>
            </div>
            
            <div class="summary-totals">
                <div class="summary-row">
                    <span>Subtotal</span>
                    <span id="summarySubtotal">0 ৳</span>
                </div>
                <div class="summary-row">
                    <span>Delivery Charge</span>
                    <span id="summaryDelivery">0 ৳</span>
                </div>
                <div class="summary-row total">
                    <span>Total</span>
                    <span id="summaryTotal">0 ৳</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Success Modal -->
    <div class="modal" id="successModal">
        <div class="modal-content">
            <h2>Order Confirmed!</h2>
            <p>Thank you for shopping with CoreX. Your premium product is on its way.</p>
            <a href="index.html" class="btn-primary" style="display: inline-block;">Return to Home</a>
        </div>
    </div>

    <script src="assets/js/products.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const isCartCheckout = urlParams.get('checkout') === 'cart';

            let price = 0;
            let totalWeight = 0;

            if (isCartCheckout) {
                const actualCart = JSON.parse(localStorage.getItem('corex_cart')) || [];
                const summaryTitle = document.getElementById('summaryTitle');
                const summaryImg = document.getElementById('summaryImg');
                const summaryDetails = document.querySelector('.summary-item');
                
                if (actualCart.length === 0) {
                    summaryTitle.textContent = "Your cart is empty.";
                    summaryImg.style.display = 'none';
                    document.querySelector('.summary-details p').style.display = 'none';
                } else if (actualCart.length === 1) {
                    const item = actualCart[0];
                    summaryTitle.textContent = item.product;
                    summaryImg.src = item.img;
                    if(item.variant) summaryImg.classList.add(item.variant);
                    price = parseFloat(item.price);
                    
                    for (const id in productDatabase) {
                        if (productDatabase[id].name === item.product) {
                            totalWeight += productDatabase[id].weight_kg || 0;
                        }
                    }
                } else {
                    summaryDetails.innerHTML = '';
                    summaryDetails.style.flexDirection = 'column';
                    summaryDetails.style.alignItems = 'flex-start';
                    actualCart.forEach(item => {
                        const imgClass = item.variant ? item.variant : '';
                        summaryDetails.innerHTML += `
                            <div style="display:flex; align-items:center; gap:15px; margin-bottom:15px; width:100%;">
                                <img src="${item.img}" class="${imgClass}" style="width:60px; height:60px; object-fit:contain; background:#000; border-radius:8px;">
                                <div>
                                    <h4 style="font-size:1rem; margin:0 0 5px 0;">${item.product}</h4>
                                    <p style="color:#888; margin:0;">${item.price.toLocaleString()} ৳</p>
                                </div>
                            </div>
                        `;
                        price += parseFloat(item.price);
                        
                        for (const id in productDatabase) {
                            if (productDatabase[id].name === item.product) {
                                totalWeight += productDatabase[id].weight_kg || 0;
                            }
                        }
                    });
                }
            } else {
                const product = urlParams.get('product') || 'CoreX Item';
                let priceStr = urlParams.get('price') || '0';
                const img = urlParams.get('img') || 'assets/images/corex_hero_light_1777254345968.png';
                const variantClass = urlParams.get('variant') || '';

                price = parseFloat(priceStr.replace(/[^0-9.]/g, ''));

                document.getElementById('summaryTitle').textContent = product;
                document.getElementById('summaryImg').src = img;
                if (variantClass) {
                    document.getElementById('summaryImg').classList.add(variantClass);
                }
                
                for (const id in productDatabase) {
                    if (productDatabase[id].name === product) {
                        totalWeight += productDatabase[id].weight_kg || 0;
                    }
                }
            }

            const regionSelect = document.getElementById('deliveryRegion');
            
            function calculateTotal() {
                const isOutside = regionSelect.value === 'outside';
                const baseDelivery = isOutside ? 130 : 80;
                const weightSurcharge = Math.ceil(totalWeight) * 20;
                
                const deliveryCharge = baseDelivery + weightSurcharge;
                const total = price + deliveryCharge;

                document.getElementById('summarySubtotal').textContent = `${price.toLocaleString()} ৳`;
                document.getElementById('summaryDelivery').textContent = `${deliveryCharge.toLocaleString()} ৳`;
                document.getElementById('summaryTotal').textContent = `${total.toLocaleString()} ৳`;
            }

            regionSelect.addEventListener('change', calculateTotal);
            calculateTotal();

            document.getElementById('checkoutForm').addEventListener('submit', (e) => {
                e.preventDefault();
                if(isCartCheckout) localStorage.removeItem('corex_cart');
                document.getElementById('successModal').style.display = 'flex';
            });
        });
    </script>
</body>
</html>
